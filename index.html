    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --accent: #e64f4f;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000;
            position: relative;
        }
        #map {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        h1 {
            color: var(--accent);
            font-size: 72px;
            font-weight: bold;
            margin-bottom: 20px;
            font-family: Arial, sans-serif;
            position: relative;
            z-index: 1;
        }
        img {
            max-width: 90%;
            max-height: 50vh;
            object-fit: contain;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }
        .location {
            color: var(--accent);
            font-size: 48px;
            font-weight: bold;
            font-family: Arial, sans-serif;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .dining-btn {
            margin-top: 32px;
            display: inline-block;
            color: var(--accent);
            font-size: 24px;
            font-weight: bold;
            font-family: Arial, sans-serif;
            text-decoration: none;
            border: 3px solid var(--accent);
            padding: 12px 28px;
            transition: background 0.15s, color 0.15s;
            position: relative;
            z-index: 1;
        }
        .dining-btn:hover {
            background: var(--accent);
            color: #000;
        }
    </style>
</head>

    <div id="map"></div>

    <script>
        const ACCENT = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
        fetch('/location.php')
            .then(response => response.json())
            .then(data => {
                document.getElementById('location').innerHTML = `${data.city}, ${data.regionName}<br>${data.lat}, ${data.lon}`;

                const map = L.map('map', {
                    dragging: false,
                    zoomControl: false,
                    scrollWheelZoom: false,
                    doubleClickZoom: false,
                    touchZoom: false,
                    keyboard: false,
                    boxZoom: false,
                }).setView([data.lat, data.lon], 12);

                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
                }).addTo(map);

                L.circleMarker([data.lat, data.lon], {
                    color: ACCENT,
                    fillColor: ACCENT,
                    fillOpacity: 0.7,
                    radius: 10,
                    weight: 2,
                }).addTo(map);
            })
            .catch(error => {
            // if there an error than put it at RPI
                document.getElementById('location').textContent = 'welcome';
                const map = L.map('map', {
                    dragging: false,
                    zoomControl: false,
                    scrollWheelZoom: false,
                    doubleClickZoom: false,
                    touchZoom: false,
                    keyboard: false,
                    boxZoom: false,
                }).setView([42.729, -73.678], 12);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
                }).addTo(map);
            });
    </script>
