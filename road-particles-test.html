<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Road Particle Effect — Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: Arial, sans-serif; }
        #container { width: 100vw; height: 100vh; }
        #ui {
            position: fixed; top: 14px; left: 14px; z-index: 10;
            color: #ccc; font-size: 12px; display: flex; flex-direction: column; gap: 6px;
        }
        #ui .row { display: flex; gap: 5px; align-items: center; }
        #ui label { color: #888; min-width: 40px; }
        #ui input[type=number] {
            background: #111; border: 1px solid #333; color: #ddd;
            padding: 3px 6px; width: 88px; font-size: 12px; border-radius: 2px;
        }
        #ui input[type=range] { width: 70px; accent-color: #e64f4f; }
        #ui button {
            background: #e64f4f; border: none; color: #fff;
            padding: 4px 12px; cursor: pointer; font-size: 12px; border-radius: 2px;
        }
        #ui button:hover { background: #ff6666; }
        #status { color: #555; font-size: 11px; max-width: 280px; line-height: 1.4; }
        #debug-wrap { margin-top: 4px; border: 1px solid #222; display: none; }
        #debug-wrap span { color: #444; font-size: 10px; display: block; padding: 2px 4px; }
        #debug-canvas { display: block; }
    </style>
</head>
<body>
<div id="container"></div>
<div id="ui">
    <div class="row">
        <label>Lat</label><input id="lat-in" type="number" step="0.001" value="42.334">
        <label>Lng</label><input id="lng-in" type="number" step="0.001" value="-71.045">
        <button onclick="restart()">Go</button>
    </div>
    <div class="row">
        <label>Zoom</label>
        <input id="zoom-in" type="range" min="13" max="16" step="1" value="14">
        <span id="zoom-val">14</span>
    </div>
    <div class="row">
        <label>Zoom</label>
        <input id="zoom-dist" type="range" min="10" max="120" step="1" value="61">
        <span id="zoom-dist-val">61</span>

    </div>
    <div class="row">
        <label>Pitch</label>
        <input id="az-in" type="range" min="5" max="85" step="1" value="62">
        <span id="az-val">62</span>
    </div>
    <div class="row">
        <label>Fog</label>
        <input id="fog-in" type="range" min="0" max="30" step="1" value="8">
        <span id="fog-val">8</span>
    </div>
    <div class="row">
        <label style="color:#f66">R</label>
        <input id="fog-r" type="range" min="0" max="255" step="1" value="99">
        <span id="fog-r-val">99</span>
    </div>
    <div class="row">
        <label style="color:#6f6">G</label>
        <input id="fog-g" type="range" min="0" max="255" step="1" value="58">
        <span id="fog-g-val">58</span>
    </div>
    <div class="row">
        <label style="color:#88f">B</label>
        <input id="fog-b" type="range" min="0" max="255" step="1" value="99">
        <span id="fog-b-val">99</span>
    </div>
    <div class="row">
        <label style="color:#555">Debug</label>
        <input type="checkbox" id="debug-toggle">
        <span style="color:#444;font-size:10px">road mask</span>
    </div>
    <div id="status">Initializing…</div>
    <div id="debug-wrap">
        <span>green = road mask (grey br 16–42, dilated 2px)</span>
        <canvas id="debug-canvas" width="192" height="192"></canvas>
    </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─────────────────────────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────────────────────────
const TILE_SIZE        = 256;
const TILE_GRID        = 4;                                      // mask: 3×3 tiles
const CANVAS_PX        = TILE_GRID * TILE_SIZE;                  // 768 — road mask area
const VISUAL_TILE_GRID = 19;                                     // visual: 19×19 tiles
const VISUAL_PX        = VISUAL_TILE_GRID * TILE_SIZE;           // 1792
const MASK_OFFSET      = ((VISUAL_TILE_GRID - TILE_GRID) / 2) * TILE_SIZE; // 512
const SCENE_SCALE      = 0.052;
const GROUND_SIZE      = CANVAS_PX * SCENE_SCALE;               // ≈ 40 units (particles)
const VISUAL_GROUND_SIZE = VISUAL_PX * SCENE_SCALE;             // ≈ 93 units (map plane)
const ACCENT         = 0xe64f4f;

const PARTICLE_COUNT  = 80;
const SPAWN_POINT_COUNT = 16; // number of random spawn points distributed across the mask
const TRAIL_LEN       = 28;
const STEPS_PER_FRAME = 2;    // canvas pixels advanced per step
const STEP_INTERVAL   = 5;    // only step particles every N frames (slows them down)
const SPAWN_RADIUS    = 120;  // canvas px from center to sample spawn pool from
const LIFETIME_MIN    = 300;  // frames before forced respawn (~5s)
const LIFETIME_MAX    = 1000;  // frames before forced respawn (~10s)
const LOOP_MEMORY     = 50;   // how many recent pixels to remember per particle

// Road pixel: #191919 = RGB(25,25,25) — confirmed from tile scan
const ROAD_R = 25, ROAD_G = 25, ROAD_B = 25;

const DX8 = [-1, 0, 1, -1, 1, -1, 0, 1];
const DY8 = [-1,-1,-1,  0, 0,  1, 1, 1];

// ─────────────────────────────────────────────────────────────────────────────
// UI
// ─────────────────────────────────────────────────────────────────────────────
const $status  = document.getElementById('status');
const $zoom    = document.getElementById('zoom-in');
const $zoomVal = document.getElementById('zoom-val');
const $dbgTog  = document.getElementById('debug-toggle');
const $dbgWrap = document.getElementById('debug-wrap');
const $dbgCvs  = document.getElementById('debug-canvas');
$zoom.oninput = () => $zoomVal.textContent = $zoom.value;
$dbgTog.onchange = () => { if (tileCanvasRef) applyMapTexture(tileCanvasRef, $dbgTog.checked); };
const $fogIn = document.getElementById('fog-in');
const $fogVal = document.getElementById('fog-val');
$fogIn.oninput = () => { $fogVal.textContent = $fogIn.value; scene.fog.density = $fogIn.value / 1000; };
const $fogR = document.getElementById('fog-r'), $fogRV = document.getElementById('fog-r-val');
const $fogG = document.getElementById('fog-g'), $fogGV = document.getElementById('fog-g-val');
const $fogB = document.getElementById('fog-b'), $fogBV = document.getElementById('fog-b-val');
function updateFogColor() {
    const c = new THREE.Color($fogR.value/255, $fogG.value/255, $fogB.value/255);
    scene.fog.color.set(c); scene.background.set(c);
    $fogRV.textContent = $fogR.value; $fogGV.textContent = $fogG.value; $fogBV.textContent = $fogB.value;
}
$fogR.oninput = $fogG.oninput = $fogB.oninput = updateFogColor;
const $zoomDist    = document.getElementById('zoom-dist');
const $zoomDistVal = document.getElementById('zoom-dist-val');
let camDist = 61;
$zoomDist.oninput = () => {
    camDist = parseFloat($zoomDist.value);
    $zoomDistVal.textContent = $zoomDist.value;
    const dir = camera.position.clone().normalize();
    camera.position.copy(dir.multiplyScalar(camDist));
    controls.update();
};

const $azIn  = document.getElementById('az-in');
const $azVal = document.getElementById('az-val');
$azIn.oninput = () => {
    $azVal.textContent = $azIn.value;
    const pitch = $azIn.value * Math.PI / 180;
    const h = camDist * Math.cos(pitch);
    camera.position.set(h, camDist * Math.sin(pitch), h);
    camera.lookAt(0, 0, 0);
    controls.update();
};
function status(msg) { $status.textContent = msg; }

// ─────────────────────────────────────────────────────────────────────────────
// THREE.JS SCENE
// ─────────────────────────────────────────────────────────────────────────────
const container = document.getElementById('container');
const scene     = new THREE.Scene();
scene.background = new THREE.Color(99/255, 58/255, 99/255);
scene.fog = new THREE.FogExp2(new THREE.Color(99/255, 58/255, 99/255), 0.008);

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 2000);
// pitch=62°, dist=61
camera.position.set(61*Math.cos(62*Math.PI/180), 61*Math.sin(62*Math.PI/180), 61*Math.cos(62*Math.PI/180));

const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(1);
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.05;
controls.autoRotate = true; controls.autoRotateSpeed = 0.35;
controls.enableZoom = false; controls.enablePan = false;
controls.enableRotate = true;
controls.maxPolarAngle = Math.PI / 2.05; controls.minPolarAngle = 0.1;

// Ground planes
const bgPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(400, 400),
    new THREE.MeshBasicMaterial({ color: 0x03010a })
);
bgPlane.rotation.x = -Math.PI / 2; bgPlane.position.y = -0.05; scene.add(bgPlane);


const mapMat   = new THREE.MeshBasicMaterial({ color: 0x080810 });
const mapPlane = new THREE.Mesh(new THREE.PlaneGeometry(VISUAL_GROUND_SIZE, VISUAL_GROUND_SIZE), mapMat);
mapPlane.rotation.x = -Math.PI / 2; mapPlane.position.y = -0.01; scene.add(mapPlane);

// Marker ring
const ringMat   = new THREE.MeshBasicMaterial({ color: ACCENT, side: THREE.DoubleSide, transparent: true, opacity: 0.9 });
const ring      = new THREE.Mesh(new THREE.RingGeometry(1.1, 1.3, 64), ringMat);
ring.rotation.x = -Math.PI / 2; ring.position.y = 0.05; scene.add(ring);

const pulseMat  = new THREE.MeshBasicMaterial({ color: ACCENT, side: THREE.DoubleSide, transparent: true, opacity: 0.22 });
const pulseRing = new THREE.Mesh(new THREE.RingGeometry(1.8, 1.95, 64), pulseMat);
pulseRing.rotation.x = -Math.PI / 2; pulseRing.position.y = 0.03; scene.add(pulseRing);

const trailGroup = new THREE.Group(); scene.add(trailGroup);

// ─────────────────────────────────────────────────────────────────────────────
// TILE FETCHING
// ─────────────────────────────────────────────────────────────────────────────
function latLngToTile(lat, lng, zoom) {
    const n = Math.pow(2, zoom), latRad = lat * Math.PI / 180;
    return {
        x: Math.floor((lng + 180) / 360 * n),
        y: Math.floor((1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n),
    };
}

async function fetchTiles(lat, lng, zoom) {
    const center  = latLngToTile(lat, lng, zoom);
    const vhalf   = Math.floor(VISUAL_TILE_GRID / 2);

    // Full 7×7 visual canvas
    const vCanvas = document.createElement('canvas');
    vCanvas.width = vCanvas.height = VISUAL_PX;
    const vCtx = vCanvas.getContext('2d');

    const load = (tx, ty) => new Promise((res, rej) => {
        const img = new Image(); img.crossOrigin = 'anonymous';
        img.onload = () => res({ img, tx, ty }); img.onerror = rej;
        img.src = `https://${'abcd'[Math.floor(Math.random()*4)]}.basemaps.cartocdn.com/dark_nolabels/${zoom}/${tx}/${ty}.png`;
    });

    const tiles = [];
    for (let dy = -vhalf; dy <= vhalf; dy++)
        for (let dx = -vhalf; dx <= vhalf; dx++)
            tiles.push(load(center.x+dx, center.y+dy));

    const results = await Promise.all(tiles);
    for (const { img, tx, ty } of results)
        vCtx.drawImage(img, (tx-center.x+vhalf)*TILE_SIZE, (ty-center.y+vhalf)*TILE_SIZE, TILE_SIZE, TILE_SIZE);

    // Extract only center 3×3 for mask — no extra compute
    const maskCanvas = document.createElement('canvas');
    maskCanvas.width = maskCanvas.height = CANVAS_PX;
    const mCtx = maskCanvas.getContext('2d');
    mCtx.drawImage(vCanvas, MASK_OFFSET, MASK_OFFSET, CANVAS_PX, CANVAS_PX, 0, 0, CANVAS_PX, CANVAS_PX);

    return { visualCanvas: vCanvas, maskCtx: mCtx };
}

// ─────────────────────────────────────────────────────────────────────────────
// PIXEL ROAD CHECK — every single movement step calls this
// ─────────────────────────────────────────────────────────────────────────────
let pixelData  = null;        // raw Uint8ClampedArray from getImageData
let roadMask   = null;        // Uint8Array: 1 = road (dilated), 0 = not road
let rawRoadMask = null;       // Uint8Array: 1 = actual road color (pre-dilation)
let nearCenterPixels = [];    // road pixels within SPAWN_RADIUS of canvas center

function isRoad(px, py) {
    if (px < 0 || py < 0 || px >= CANVAS_PX || py >= CANVAS_PX) return false;
    return roadMask[py * CANVAS_PX + px] === 1;
}

// Build road mask: match all uniform-grey pixels in the road brightness band,
// then dilate 2px to close intersection and casing gaps.
// Road band: brightness 16–42, R≈G≈B (spread ≤ 10).
// Background is ~10 brightness — safely excluded.
function buildRoadMask() {
    const size = CANVAS_PX * CANVAS_PX;
    const base = new Uint8Array(size);
    for (let i = 0; i < size; i++) {
        const p = i * 4;
        const r = pixelData[p], g = pixelData[p+1], b = pixelData[p+2];
        const br = (r + g + b) / 3;
        const spread = Math.max(r, g, b) - Math.min(r, g, b);
        if (br >= 18 && br <= 34 && spread <= 5) base[i] = 1;
    }
    rawRoadMask = base;
    // Two rounds of dilation to close gaps
    roadMask = new Uint8Array(size);
    const tmp  = new Uint8Array(size);
    for (let py = 0; py < CANVAS_PX; py++) {
        for (let px = 0; px < CANVAS_PX; px++) {
            if (!base[py * CANVAS_PX + px]) continue;
            tmp[py * CANVAS_PX + px] = 1;
            for (let d = 0; d < 8; d++) {
                const nx = px + DX8[d], ny = py + DY8[d];
                if (nx >= 0 && ny >= 0 && nx < CANVAS_PX && ny < CANVAS_PX) tmp[ny * CANVAS_PX + nx] = 1;
            }
        }
    }
    for (let py = 0; py < CANVAS_PX; py++) {
        for (let px = 0; px < CANVAS_PX; px++) {
            if (!tmp[py * CANVAS_PX + px]) continue;
            roadMask[py * CANVAS_PX + px] = 1;
            for (let d = 0; d < 8; d++) {
                const nx = px + DX8[d], ny = py + DY8[d];
                if (nx >= 0 && ny >= 0 && nx < CANVAS_PX && ny < CANVAS_PX) roadMask[ny * CANVAS_PX + nx] = 1;
            }
        }
    }
}

// ─────────────────────────────────────────────────────────────────────────────
// FIND NEAREST ROAD PIXEL TO CANVAS CENTER
// ─────────────────────────────────────────────────────────────────────────────
let centerRoadPx = CANVAS_PX >> 1;
let centerRoadPy = CANVAS_PX >> 1;
let knownRoadPixels = []; // sampled pool of confirmed road pixels for respawning

function findCenterRoad() {
    const cx = CANVAS_PX >> 1, cy = CANVAS_PX >> 1;
    // First pass: find nearest road intersection (3+ neighbors) — good spawn point
    for (let r = 0; r < 250; r++) {
        for (let dy = -r; dy <= r; dy++) {
            for (let dx = -r; dx <= r; dx++) {
                if (r > 0 && Math.abs(dx) !== r && Math.abs(dy) !== r) continue;
                const nx = cx+dx, ny = cy+dy;
                if (isRoad(nx, ny) && roadNeighbors(nx, ny, -1, -1).length >= 3) {
                    centerRoadPx = nx; centerRoadPy = ny; return true;
                }
            }
        }
    }
    // Fallback: any road pixel near center
    for (let r = 0; r < 250; r++) {
        for (let dy = -r; dy <= r; dy++) {
            for (let dx = -r; dx <= r; dx++) {
                if (r > 0 && Math.abs(dx) !== r && Math.abs(dy) !== r) continue;
                const nx = cx+dx, ny = cy+dy;
                if (isRoad(nx, ny)) { centerRoadPx = nx; centerRoadPy = ny; return true; }
            }
        }
    }
    return false;
}

// ─────────────────────────────────────────────────────────────────────────────
// PARTICLE WALK — real-time #262626 pixel traversal
// ─────────────────────────────────────────────────────────────────────────────
function roadNeighbors(px, py, prevPx, prevPy) {
    const out = [];
    for (let d = 0; d < 8; d++) {
        const nx = px + DX8[d], ny = py + DY8[d];
        if (nx === prevPx && ny === prevPy) continue;  // don't backtrack
        if (isRoad(nx, ny)) out.push([nx, ny]);
    }
    return out;
}

function pickNext(neighbors, px, py, prevPx, prevPy, spawnPx, spawnPy, visited) {
    const dirX = px - prevPx, dirY = py - prevPy;
    // Normalize direction so diagonal doesn't beat axis-aligned
    const dirLen = Math.sqrt(dirX*dirX + dirY*dirY) || 1;
    const ndx = dirX / dirLen, ndy = dirY / dirLen;
    // Normalized outward vector
    const rawX = px - spawnPx, rawY = py - spawnPy;
    const outLen = Math.sqrt(rawX*rawX + rawY*rawY) || 1;
    const outX = rawX / outLen, outY = rawY / outLen;

    let best = null, bestScore = -Infinity;
    for (const [nx, ny] of neighbors) {
        const stepX = nx - px, stepY = ny - py;
        const stepLen = Math.sqrt(stepX*stepX + stepY*stepY) || 1;
        const forward  = (stepX/stepLen) * ndx + (stepY/stepLen) * ndy;  // -1 to 1
        const outward  = (stepX/stepLen) * outX + (stepY/stepLen) * outY; // -1 to 1
        const visitPen = visited && visited.has(ny * CANVAS_PX + nx) ? -2.0 : 0;
        const score    = forward * 1.8 + outward * 0.4 + visitPen + (Math.random() - 0.5) * 0.4;
        if (score > bestScore) { bestScore = score; best = [nx, ny]; }
    }
    return best;
}

function pixelToScene(px, py) {
    return {
        x: (px - CANVAS_PX / 2) * SCENE_SCALE,
        z: (py - CANVAS_PX / 2) * SCENE_SCALE,
    };
}

// ─────────────────────────────────────────────────────────────────────────────
// PARTICLE SYSTEM
// ─────────────────────────────────────────────────────────────────────────────
let headMesh = null, headPos = null;
let trailMesh = null;
let trailPos = [], trailCol = [];
let particles  = [];
let spawnPoints = []; // N random road intersections spread across the mask

function buildSpawnPoints() {
    // Only spawn on actual road-colored pixels (pre-dilation), prefer intersections
    const rawPool = knownRoadPixels.filter(([px, py]) =>
        rawRoadMask[py * CANVAS_PX + px] === 1 && !isKillColor(px, py));
    const src2 = rawPool.length ? rawPool : knownRoadPixels;
    const pool = src2.filter(([px, py]) => roadNeighbors(px, py, -1, -1).length >= 3 && !isKillColor(px, py));
    const src  = pool.length ? pool : src2;
    spawnPoints = [];
    // Shuffle a copy and pick evenly spaced entries for distribution
    const step = Math.max(1, Math.floor(src.length / SPAWN_POINT_COUNT));
    for (let i = 0; i < SPAWN_POINT_COUNT && i * step < src.length; i++) {
        spawnPoints.push(src[i * step]);
    }
    if (!spawnPoints.length) spawnPoints.push([centerRoadPx, centerRoadPy]);
}

function randomSpawnPoint() {
    return spawnPoints[Math.floor(Math.random() * spawnPoints.length)];
}

function initAtSpawn(p, spx, spy, ageOffset) {
    p.px = spx; p.py = spy; p.prevPx = -1; p.prevPy = -1;
    p.spawnPx = spx; p.spawnPy = spy;
    p.trail = []; p.trailHead = 0; p.trailFill = 0;
    p.visited = new Set();
    p.visited.add(spy * CANVAS_PX + spx);
    p.age = ageOffset || 0;
    p.maxAge = LIFETIME_MIN + Math.floor(Math.random() * (LIFETIME_MAX - LIFETIME_MIN));
    const dirs = roadNeighbors(spx, spy, -1, -1);
    if (dirs.length) {
        const d = dirs[Math.floor(Math.random() * dirs.length)];
        p.prevPx = spx - (d[0] - spx);
        p.prevPy = spy - (d[1] - spy);
    }
}

function makeParticle(ageOffset) {
    const [spx, spy] = randomSpawnPoint();
    const p = { px: 0, py: 0, prevPx: -1, prevPy: -1, spawnPx: 0, spawnPy: 0, trail: [], visited: new Set(), age: 0, maxAge: 0 };
    initAtSpawn(p, spx, spy, ageOffset);
    return p;
}

function spawnParticle(ageOffset) { return makeParticle(ageOffset); }

function respawnParticle(p) {
    const [spx, spy] = randomSpawnPoint();
    initAtSpawn(p, spx, spy, 0);
}

function isKillColor(px, py) {
    if (!pixelData || px < 0 || py < 0 || px >= CANVAS_PX || py >= CANVAS_PX) return false;
    const i = (py * CANVAS_PX + px) * 4;
    const r = pixelData[i], g = pixelData[i+1], b = pixelData[i+2];
    return Math.abs(r - 108) <= 8 && Math.abs(g - 108) <= 8 && Math.abs(b - 108) <= 8;
}

function stepParticle(p) {
    p.age++;

    // Timed respawn
    if (p.age >= p.maxAge) {
        respawnParticle(p);
        return;
    }

    for (let s = 0; s < STEPS_PER_FRAME; s++) {
        // Kill if on #6c6c6c (e.g. highway/overpass artifact)
        if (isKillColor(p.px, p.py)) {
            respawnParticle(p);
            break;
        }

        // Mark current pixel visited (rolling window)
        const curKey = p.py * CANVAS_PX + p.px;
        p.visited.add(curKey);
        if (p.visited.size > LOOP_MEMORY) {
            p.visited.delete(p.visited.values().next().value);
        }

        const neighbors = roadNeighbors(p.px, p.py, p.prevPx, p.prevPy);
        if (!neighbors.length) {
            respawnParticle(p);
            break;
        }
        const next = pickNext(neighbors, p.px, p.py, p.prevPx, p.prevPy, p.spawnPx, p.spawnPy, p.visited);
        p.prevPx = p.px; p.prevPy = p.py;
        p.px = next[0]; p.py = next[1];
    }

    // Record scene position into ring buffer
    const pos = pixelToScene(p.px, p.py);
    p.trailBuf[p.trailHead * 2]     = pos.x;
    p.trailBuf[p.trailHead * 2 + 1] = pos.z;
    p.trailHead = (p.trailHead + 1) % TRAIL_LEN;
    if (p.trailFill < TRAIL_LEN) p.trailFill++;
}

function initParticleSystem() {
    // Dispose old
    if (trailMesh) { trailMesh.geometry.dispose(); trailMesh.material.dispose(); trailGroup.remove(trailMesh); trailMesh = null; }
    if (headMesh)  { headMesh.geometry.dispose();  headMesh.material.dispose();  scene.remove(headMesh); headMesh = null; }
    particles = []; trailPos = []; trailCol = [];

    // Single geometry for ALL trails — one draw call instead of PARTICLE_COUNT draw calls
    const totalVerts = PARTICLE_COUNT * TRAIL_LEN;
    const allPos = new Float32Array(totalVerts * 3);
    const allCol = new Float32Array(totalVerts * 3);
    headPos = new Float32Array(PARTICLE_COUNT * 3);

    for (let i = 0; i < PARTICLE_COUNT; i++) {
        const ageOffset = Math.floor((i / PARTICLE_COUNT) * LIFETIME_MIN);
        const p = spawnParticle(ageOffset);
        // Ring buffer instead of array with shift()
        p.trailBuf = new Float32Array(TRAIL_LEN * 2); // x,z pairs
        p.trailHead = 0;
        p.trailFill = 0;
        particles.push(p);
        trailPos.push(allPos.subarray(i * TRAIL_LEN * 3, (i+1) * TRAIL_LEN * 3));
        trailCol.push(allCol.subarray(i * TRAIL_LEN * 3, (i+1) * TRAIL_LEN * 3));
    }

    const trailGeo = new THREE.BufferGeometry();
    trailGeo.setAttribute('position', new THREE.BufferAttribute(allPos, 3));
    trailGeo.setAttribute('color',    new THREE.BufferAttribute(allCol, 3));
    // Draw as points so we don't need per-particle line segments
    trailMesh = new THREE.Points(trailGeo, new THREE.PointsMaterial({
        vertexColors: true, size: 0.12, sizeAttenuation: true, transparent: true, opacity: 0.85,
    }));
    trailMesh.frustumCulled = false;
    trailGroup.add(trailMesh);

    const hGeo = new THREE.BufferGeometry();
    hGeo.setAttribute('position', new THREE.BufferAttribute(headPos, 3));
    headMesh = new THREE.Points(hGeo, new THREE.PointsMaterial({
        color: ACCENT, size: 0.5, transparent: true, opacity: 1, sizeAttenuation: true,
    }));
    headMesh.frustumCulled = false;
    scene.add(headMesh);
}

function updateParticles() {
    for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        stepParticle(p);

        // Head position
        const pos = pixelToScene(p.px, p.py);
        headPos[i*3] = pos.x; headPos[i*3+1] = 0.08; headPos[i*3+2] = pos.z;

        // Trail from ring buffer — oldest to newest
        const pb = trailPos[i], cb = trailCol[i];
        for (let j = 0; j < TRAIL_LEN; j++) {
            const age = j - (TRAIL_LEN - p.trailFill); // negative = not yet filled
            let x, z;
            if (age < 0) {
                x = pos.x; z = pos.z;
            } else {
                const idx = (p.trailHead - p.trailFill + age + TRAIL_LEN) % TRAIL_LEN;
                x = p.trailBuf[idx * 2]; z = p.trailBuf[idx * 2 + 1];
            }
            pb[j*3] = x; pb[j*3+1] = 0.06; pb[j*3+2] = z;
            const lum = Math.pow(j / (TRAIL_LEN - 1), 2);
            cb[j*3] = 0.9*lum; cb[j*3+1] = 0.07*lum*lum; cb[j*3+2] = 0.07*lum*lum;
        }
    }
    if (trailMesh) { trailMesh.geometry.attributes.position.needsUpdate = true; trailMesh.geometry.attributes.color.needsUpdate = true; }
    if (headMesh) headMesh.geometry.attributes.position.needsUpdate = true;
}


// ─────────────────────────────────────────────────────────────────────────────
// MAP TEXTURE
// ─────────────────────────────────────────────────────────────────────────────
let activeTex = null;
let tileCanvasRef = null; // original tiles, unmodified

function applyMapTexture(canvas, withMaskOverlay) {
    if (activeTex) activeTex.dispose();
    const oc = document.createElement('canvas');
    oc.width = oc.height = VISUAL_PX;
    const octx = oc.getContext('2d');
    octx.drawImage(canvas, 0, 0);
    if (withMaskOverlay && roadMask) {
        // Mask is center 3×3 — offset it into the 7×7 visual canvas
        const id = octx.getImageData(MASK_OFFSET, MASK_OFFSET, CANVAS_PX, CANVAS_PX);
        const d = id.data;
        for (let i = 0; i < CANVAS_PX * CANVAS_PX; i++) {
            if (roadMask[i]) { d[i*4]=0; d[i*4+1]=255; d[i*4+2]=0; d[i*4+3]=255; }
        }
        octx.putImageData(id, MASK_OFFSET, MASK_OFFSET);
    }
    activeTex = new THREE.CanvasTexture(oc);
    activeTex.needsUpdate = true;
    mapMat.map = activeTex; mapMat.color.set(0xffffff); mapMat.needsUpdate = true;
}

// ─────────────────────────────────────────────────────────────────────────────
// MAIN
// ─────────────────────────────────────────────────────────────────────────────
let running = false;

async function run(lat, lng) {
    running = false;
    const zoom = parseInt($zoom.value);
    status(`Fetching tiles at z${zoom}…`);
    pixelData = null;

    try {
        const { visualCanvas, maskCtx } = await fetchTiles(lat, lng, zoom);
        tileCanvasRef = visualCanvas;
        applyMapTexture(visualCanvas);
        status('Tiles loaded. Reading pixels…');

        try {
            pixelData = maskCtx.getImageData(0, 0, CANVAS_PX, CANVAS_PX).data;
            buildRoadMask();
            if ($dbgTog.checked) applyMapTexture(visualCanvas, true);

            const ci  = ((CANVAS_PX >> 1) * CANVAS_PX + (CANVAS_PX >> 1)) * 4;
            const centerColor = `rgb(${pixelData[ci]},${pixelData[ci+1]},${pixelData[ci+2]})`;

            const found = findCenterRoad();
            if (!found) {
                status(`No road pixels near center (center=${centerColor}). Try a different location or zoom.`);
                return;
            }

            // Build a pool of all road pixels so respawn isn't stuck at one isolated point
            knownRoadPixels = [];
            const _cx = CANVAS_PX >> 1, _cy = CANVAS_PX >> 1;
            const _r2 = SPAWN_RADIUS * SPAWN_RADIUS;
            nearCenterPixels = [];
            for (let py2 = 0; py2 < CANVAS_PX; py2++) {
                for (let px2 = 0; px2 < CANVAS_PX; px2++) {
                    if (isRoad(px2, py2)) {
                        knownRoadPixels.push([px2, py2]);
                        const dx = px2 - _cx, dy = py2 - _cy;
                        if (dx*dx + dy*dy <= _r2) nearCenterPixels.push([px2, py2]);
                    }
                }
            }
            console.log(`[road-particles] found ${knownRoadPixels.length} road pixels, ${nearCenterPixels.length} near center`);

            if (!knownRoadPixels.length) {
                status(`No road pixels (#191919) found. Try a different zoom or location.`);
                return;
            }

            buildSpawnPoints();
            console.log(`[road-particles] ${spawnPoints.length} spawn points across mask`);

            initParticleSystem();
            running = true;
            status(`Live — ${knownRoadPixels.length} road pixels, ${PARTICLE_COUNT} particles`);
        } catch (e) {
            console.warn('getImageData blocked:', e);
            status('Pixel read blocked (CORS) — cannot detect roads.');
        }
    } catch (e) {
        console.warn('Tile fetch failed:', e);
        status('Tile fetch failed.');
    }
}

// ─────────────────────────────────────────────────────────────────────────────
// ANIMATION LOOP
// ─────────────────────────────────────────────────────────────────────────────
let time = 0, frame = 0;
(function animate() {
    requestAnimationFrame(animate);
    time += 0.016; frame++;
    const s = 1 + Math.sin(time*1.5)*0.22;
    pulseRing.scale.set(s, s, 1);
    pulseMat.opacity = 0.22 - Math.sin(time*1.5)*0.1;

if (running && pixelData && frame % STEP_INTERVAL === 0) updateParticles();
    controls.update();
    renderer.render(scene, camera);
})();

window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});

function restart() {
    const lat = parseFloat(document.getElementById('lat-in').value);
    const lng = parseFloat(document.getElementById('lng-in').value);
    if (!isNaN(lat) && !isNaN(lng)) run(lat, lng);
}
window.restart = restart;

fetch('/location.php')
    .then(r => r.json())
    .then(d => run(d.lat, d.lon))
    .catch(() => run(42.33418545905304, -71.0445458583231));
</script>
