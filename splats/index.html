<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gaussian Splat Tour</title>
    <link rel="icon" type="image/png" href="../image.png">
    <link rel="stylesheet" href="https://unpkg.com/@playcanvas/supersplat-viewer@1.22.0/public/index.css">
    <link rel="stylesheet" href="./tour.css">
</head>
<body>
    <div id="viewer-mount"></div>

    <div id="tour-status" role="status">Loading tour...</div>

    <header class="tour-topbar">
        <a class="tour-home" href="../" aria-label="Back to home">Back</a>
        <div class="tour-title">
            <span>Gaussian Splat Tour</span>
            <small id="renderer-label">client GPU viewer</small>
        </div>
        <button id="copy-pose" class="tour-utility" type="button">Copy Pose</button>
    </header>

    <section class="tour-panel" aria-live="polite">
        <div class="tour-meta">
            <span id="tour-count"></span>
            <div id="tour-dots" class="tour-dots" aria-hidden="true"></div>
        </div>
        <h1 id="tour-heading"></h1>
        <p id="tour-copy"></p>
        <div class="tour-actions">
            <button id="tour-prev" type="button" aria-label="Previous stop">Prev</button>
            <button id="tour-next" type="button" aria-label="Next stop">Next</button>
        </div>
        <pre id="pose-output" class="pose-output" hidden></pre>
    </section>

    <script type="module" src="./tour.js"></script>
</body>
</html>
