<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Playground | ganguli.dev</title>
    <link rel="icon" type="image/png" href="../image.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="playground.css">
</head>
<body class="playground-page">
<div id="container"></div>
<div id="status" aria-live="polite"></div>

<header id="playground-top">
    <a class="dining-btn" href="../">Home</a>
    <h1>map playground</h1>
</header>

<main id="playground-panel" aria-label="Map playground controls">
    <form id="location-form" class="control-section">
        <h2>Location</h2>
        <div class="location-grid">
            <label>
                <span>Lat</span>
                <input id="lat-input" type="number" min="-85" max="85" step="0.000001" value="42.334185">
            </label>
            <label>
                <span>Long</span>
                <input id="lng-input" type="number" min="-180" max="180" step="0.000001" value="-71.044546">
            </label>
            <label>
                <span>Zoom</span>
                <input id="zoom-input" type="number" min="10" max="16" step="1" value="13">
            </label>
        </div>
        <div id="picker-map" aria-label="Location picker map"></div>
        <div class="playground-actions">
            <button class="dining-btn" type="submit">Load Map</button>
            <button class="dining-btn" id="use-ip-btn" type="button">Use IP</button>
            <button class="dining-btn" id="reset-settings-btn" type="button">Reset</button>
        </div>
    </form>

    <section class="control-section">
        <h2>Particles</h2>
        <div id="particle-controls"></div>
    </section>

    <div id="map-readout"></div>
</main>

<script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module" src="map-playground.js"></script>
</body>
</html>
